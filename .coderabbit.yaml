# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
reviews:
  in_progress_fortune: false
  profile: chill
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: true
    ignore_usernames: [nfbot]
  pre_merge_checks:
    title:
      mode: warning
      requirements: "Title should be concise and descriptive with a general, short summary of the changes, ideally under 50 characters. No references to other PR or issues. Can't end with a full stop."
chat:
  art: false
